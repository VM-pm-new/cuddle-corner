
<!DOCTYPE html>
<html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuddle Corner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>🧸 Cuddle Corner</h1>
    <div id="cart" onclick="toggleCart()">
      🛒 Cart: <span id="cart-count">0</span>
    </div>
  </header>

  <!-- Cart Box -->
  <div id="cart-items">
    <h2>Your Cart 🛒</h2>
    <ul id="cart-list"></ul>
    <p id="total"></p>
  </div>

  <!-- Products -->
  <div class="products">

    <div class="card">
      <img src="Images/teddy.jpg">
      <h3>Teddy Bear 🧸</h3>
      <p>₹499</p>
      <button onclick="addToCart('Teddy Bear', 499)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="Images/panda.jpg">
      <h3>Panda Toy 🐼</h3>
      <p>₹599</p>
      <button onclick="addToCart('Panda Toy', 599)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="Images/bunny.jpg">
      <h3>Bunny Plush 🐰</h3>
      <p>₹399</p>
      <button onclick="addToCart('Bunny Plush', 399)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="Images/elephant.jpg">
      <h3>Elephant Soft Toy 🐘</h3>
      <p>₹699</p>
      <button onclick="addToCart('Elephant', 699)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="Images/unicorn.jpg">
      <h3>Unicorn Plush 🦄</h3>
      <p>₹799</p>
      <button onclick="addToCart('Unicorn', 799)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="Images/dog.jpg">
      <h3>Dog Soft Toy 🐶</h3>
      <p>₹549</p>
      <button onclick="addToCart('Dog', 549)">Add to Cart</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
